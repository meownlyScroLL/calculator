<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <p class="input_result"></p>
        </div>
        <div class="numpad">
            <div class="row">
                <button class="_button" id="seven">7</button>
                <button class="_button" id="eight">8</button>
                <button class="_button" id="nine">9</button>
                <button class="_button" id="divide">÷</button>
            </div>
            <div class="row">
                <button class="_button" id="four">4</button>
                <button class="_button" id="five">5</button>
                <button class="_button" id="six">6</button>
                <button class="_button" id="multiply">x</button>
            </div>
            <div class="row">
                <button class="_button" id="one">1</button>
                <button class="_button" id="two">2</button>
                <button class="_button" id="three">3</button>
                <button class="_button" id="extract">-</button>
            </div>
            <div class="row">
                <button class="_button" id="zero">0</button>
                <button class="_button" id="dot">.</button>
                <button class="_button" id="add">+</button>
                <button class="_button" id="equals">=</button>
            </div>
            <div class="row">
                <button class="_button" id="clear">CLEAR</button>
                <button class="_button" id="delete">⌫</button>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
